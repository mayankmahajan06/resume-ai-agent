<!-- resume-preview.component.html -->
<!-- COMPLETE FILE -->

<section class="preview-wrapper">
  <!-- ==========================================
       ATS SCORE CARD
       jdMatch flows in automatically from
       ResumeService after JD modal closes in Step 6
  =========================================== -->
  <div class="hero-score-card">
    <div class="hero-left">
      <p class="label">ATS Resume Score</p>
      <h2>{{ atsScore }}%</h2>
      <span class="status-badge">{{ atsStatus }}</span>
    </div>

    <div class="hero-right">
      <!-- JD Match score — updates live from service stream -->
      <div
        class="mini-score"
        [class.jd-good]="jdMatchClass === 'jd-good'"
        [class.jd-medium]="jdMatchClass === 'jd-medium'"
        [class.jd-low]="jdMatchClass === 'jd-low'"
      >
        <span>JD Match</span>
        <strong>{{ jdMatchLabel }}</strong>
        <p class="jd-hint" *ngIf="jdMatch === 0">
          {{ isPro ? "Run analysis in Step 6 →" : "🔒 Pro feature" }}
        </p>
      </div>

      <div class="mini-score">
        <span>Recruiter Visibility</span>
        <strong>{{ recruiterVisibility }}</strong>
      </div>
    </div>
  </div>

  <!-- ==========================================
       THEME SELECTOR
       Free = only indigo | Pro = all 5
  =========================================== -->
  <div class="theme-toolbar">
    <div class="theme-switcher">
      <label>Resume Theme</label>

      <div class="color-dots">
        <button
          type="button"
          class="color-dot indigo"
          [class.active]="selectedTheme === 'indigo'"
          (click)="changeTheme('indigo')"
        ></button>

        <button
          type="button"
          class="color-dot navy"
          [class.locked]="userPlan === 'free'"
          [class.active]="selectedTheme === 'navy'"
          (click)="changeTheme('navy')"
        >
          <span *ngIf="userPlan === 'free'">🔒</span>
        </button>

        <button
          type="button"
          class="color-dot emerald"
          [class.locked]="userPlan === 'free'"
          [class.active]="selectedTheme === 'emerald'"
          (click)="changeTheme('emerald')"
        >
          <span *ngIf="userPlan === 'free'">🔒</span>
        </button>

        <button
          type="button"
          class="color-dot slate"
          [class.locked]="userPlan === 'free'"
          [class.active]="selectedTheme === 'slate'"
          (click)="changeTheme('slate')"
        >
          <span *ngIf="userPlan === 'free'">🔒</span>
        </button>

        <button
          type="button"
          class="color-dot burgundy"
          [class.locked]="userPlan === 'free'"
          [class.active]="selectedTheme === 'burgundy'"
          (click)="changeTheme('burgundy')"
        >
          <span *ngIf="userPlan === 'free'">🔒</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ==========================================
       LIVE RESUME RENDER
  =========================================== -->
  
  <app-modern-template
    *ngIf="selectedTemplate === 'modern'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  ></app-modern-template>

  <app-executive-left-rail-template
    *ngIf="selectedTemplate === 'executive'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  ></app-executive-left-rail-template>

  <!-- COMPACT GRID -->

  <app-compact-grid-template
    *ngIf="selectedTemplate === 'compact'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  >
  </app-compact-grid-template>

  <!-- CLEAN LIGHT -->

  <app-clean-light-template
    *ngIf="selectedTemplate === 'clean'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  >
  </app-clean-light-template>

  <!-- BRAND INNOVATOR -->

  <app-brand-innovator-template
    *ngIf="selectedTemplate === 'brand'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  >
  </app-brand-innovator-template>

  <!-- ACADEMIC CV -->

  <app-academic-cv-template
    *ngIf="selectedTemplate === 'academic'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  >
  </app-academic-cv-template>
</section>
