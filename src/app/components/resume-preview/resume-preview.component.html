<!-- resume-preview.component.html -->
<!-- COMPLETE FILE -->
<!-- Premium PDF Version using REAL user-entered content -->

<section class="preview-wrapper">
  <!-- ATS SCORE -->
  <div class="hero-score-card">
    <div class="hero-left">
      <p class="label">ATS Resume Score</p>
      <h2>{{ atsScore }}%</h2>
      <span class="status-badge"> {{ atsStatus }} </span>
    </div>

    <div class="hero-right">
      <div class="mini-score">
        <span>JD Match</span>
        <strong>
          {{ jdMatch > 0 ? jdMatch + "%" : "Not Analyzed" }}
        </strong>
      </div>

      <div class="mini-score">
        <span>Recruiter Visibility</span>
        <strong>High</strong>
      </div>
    </div>
  </div>

  <!-- THEME SELECTOR -->
  <div class="theme-toolbar">
    <div class="theme-switcher">
      <label>Resume Theme</label>

      <div class="color-dots">
        <button
          type="button"
          class="color-dot indigo"
          [class.active]="selectedTheme === 'indigo'"
          (click)="changeTheme('indigo')"
        ></button>

        <button
          type="button"
          class="color-dot navy"
          [class.active]="selectedTheme === 'navy'"
          (click)="changeTheme('navy')"
        ></button>

        <button
          type="button"
          class="color-dot emerald"
          [class.active]="selectedTheme === 'emerald'"
          (click)="changeTheme('emerald')"
        ></button>

        <button
          type="button"
          class="color-dot slate"
          [class.active]="selectedTheme === 'slate'"
          (click)="changeTheme('slate')"
        ></button>

        <button
          type="button"
          class="color-dot burgundy"
          [class.active]="selectedTheme === 'burgundy'"
          (click)="changeTheme('burgundy')"
        ></button>
      </div>
    </div>
  </div>

  <div class="template-toolbar">
    <h3>Choose Template</h3>

    <div class="template-grid">
      <div
        class="template-card"
        *ngFor="let template of templates"
        [class.active]="selectedTemplate === template.id"
        (click)="selectTemplate(template.id)"
      >
        <h4>
          {{ template.name }}
        </h4>

        <span *ngIf="template.premium"> Premium </span>
      </div>
    </div>
  </div>

  <!-- RESUME SECTION -->
  <app-modern-template *ngIf="selectedTemplate === 'modern'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  >
  </app-modern-template>

  <app-premium-template *ngIf="selectedTemplate === 'premium'"
    [resumeData]="resumeData"
    [selectedTheme]="selectedTheme"
  >
  </app-premium-template>

  <!-- ACTION BUTTONS -->
  <div class="action-row">
    <button type="button" class="secondary-btn" (click)="openJDModal()">
      Analyze JD Match
    </button>

    <button
      type="button"
      class="primary-btn"
      (click)="downloadPDF()"
      [disabled]="isDownloading"
    >
      {{ isDownloading ? "Generating PDF..." : "Download PDF" }}
    </button>
  </div>

  <div *ngIf="downloadSuccessMessage" class="download-toast success">
    {{ downloadSuccessMessage }}
  </div>

  <div *ngIf="downloadErrorMessage" class="download-toast error">
    {{ downloadErrorMessage }}
  </div>
</section>
