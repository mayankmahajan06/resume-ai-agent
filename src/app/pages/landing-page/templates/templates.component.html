<section id="templates" class="templates-section">
  <div class="container">
    <div class="section-header">
      <span class="section-badge"> RESUME TEMPLATES </span>

      <h2>Choose Your Resume Style</h2>

      <p>Professional ATS-friendly templates designed to help you stand out.</p>
    </div>

    <div class="templates-grid">
      <div class="template-card" *ngFor="let template of templates">
        <div class="plan-badge" [class.pro]="template.badge === 'PRO'">
          {{ template.badge }}
        </div>

        <div class="image-wrapper">
          <img [src]="template.image" [alt]="template.name" />
        </div>

        <div class="template-content">
          <h3>
            {{ template.name }}
          </h3>

          <p>
            {{ template.description }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
