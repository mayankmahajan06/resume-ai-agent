<!-- resume-builder.component.html -->

<section class="resume-builder-page">
  <!-- Premium Workspace Header -->
  <app-workspace-header
    subtitle="AI Resume Optimizer Workspace"
    [showMyResumesButton]="true"
    [showSaveButton]="true"
    [isSaving]="isSaving"
    (save)="saveResume()"
  >
  </app-workspace-header>

  <!-- Main Builder Layout -->
  <div class="builder-layout">
    <!-- Left Workspace -->
    <div class="builder-left">
      <app-resume-form></app-resume-form>
    </div>

    <!-- Right Sticky Preview -->
    <div class="builder-right">
      <app-resume-preview (atsScoreChange)="atsScore = $event"></app-resume-preview>
    </div>
  </div>
</section>

<!-- SAVE TOAST -->

<div *ngIf="saveSuccessMessage" class="save-toast success">
  <mat-icon>check_circle</mat-icon>

  <span>
    {{ saveSuccessMessage }}
  </span>
</div>

<div *ngIf="saveErrorMessage" class="save-toast error">
  <mat-icon>error</mat-icon>

  <span>
    {{ saveErrorMessage }}
  </span>
</div>
